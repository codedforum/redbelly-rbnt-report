<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RBNT · Token Utility and Ecosystem Visibility</title>
<meta name="description" content="RBNT token utility report, reproducible charts, and DeFiLlama and RWA.xyz submission kits for Redbelly Network.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" integrity="sha384-wH75j6z1lH97ZOpMOInqhgKzFkAInZPPSPlZpYKYTOqsaizPvhQZmAtLcPKXpLyH" crossorigin="anonymous"/>
<style>
:root{--bg:#07090e;--panel:#0f131b;--card:#131825;--line:#222838;--line2:#2c3346;--t1:#eef2f8;--t2:#9aa6b8;--t3:#6b7488;--red:#e23b54;--red2:#ff5570;--blue:#7db0ff;--teal:#16c0c8;--amber:#f5a623;--violet:#7c6cf2;--sb:256px}
*{box-sizing:border-box}html,body{margin:0}
body{color:var(--t1);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;background:var(--bg);overflow-x:hidden}
a{color:var(--blue);text-decoration:none}
#particles{position:fixed;inset:0;z-index:-3}
.bgwrap{position:fixed;inset:0;z-index:-2;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.18;animation:drift 28s ease-in-out infinite}
.blob.a{width:640px;height:640px;background:#e23b54;top:-200px;right:-140px}
.blob.b{width:540px;height:540px;background:#1577e8;bottom:-180px;left:-140px;animation-delay:-9s}
.blob.c{width:460px;height:460px;background:#16c0c8;top:42%;left:54%;animation-delay:-16s;opacity:.1}
.grid{position:fixed;inset:0;z-index:-1;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px;animation:gridmove 44s linear infinite;mask-image:radial-gradient(ellipse at 50% 0,#000,transparent 82%)}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-4%,3%) scale(1.07)}}
@keyframes gridmove{from{background-position:0 0}to{background-position:48px 48px}}
@keyframes fadeup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shine{to{background-position:200% center}}
.scrollprog{position:fixed;top:0;left:0;height:3px;width:0;background:linear-gradient(90deg,var(--red),var(--red2),var(--amber));z-index:60;transition:width .1s;box-shadow:0 0 10px rgba(226,59,84,.6)}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sb);flex:0 0 var(--sb);background:linear-gradient(180deg,rgba(15,19,27,.9),rgba(8,10,15,.9));backdrop-filter:blur(10px);border-right:1px solid var(--line);padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.brand img{width:40px;height:40px;filter:drop-shadow(0 0 12px rgba(226,59,84,.5));animation:bob 5s ease-in-out infinite}
.brand .bt{font-weight:800;font-size:15px;line-height:1.1}.brand .bs{color:var(--t3);font-size:11px}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:18px}
.nav a{position:relative;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--t2);font-size:13.5px;cursor:pointer;border:1px solid transparent;transition:.18s}
.nav a svg{width:16px;height:16px;opacity:.8;flex:0 0 16px}
.nav a:hover{background:#121826;color:var(--t1);transform:translateX(3px)}
.nav a.active{background:rgba(226,59,84,.12);border-color:rgba(226,59,84,.32);color:var(--t1)}
.nav a.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--red)}
.sidefoot{margin-top:24px;padding-top:16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.sidefoot a{color:var(--t3);font-size:12.5px}.sidefoot a:hover{color:var(--blue)}
main{flex:1;min-width:0}
.content{max-width:900px;margin:0 auto;padding:34px 28px 110px}
.content.swap{animation:fadeup .42s both}
/* hero */
.hero{position:relative;background:linear-gradient(160deg,rgba(226,59,84,.12),rgba(19,24,36,.5));border:1px solid var(--line);border-radius:22px;padding:38px 34px;overflow:hidden}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:300px;height:300px;background:radial-gradient(circle,rgba(226,59,84,.22),transparent 65%)}
.hero .htext{position:relative;max-width:560px}
.hero h1{font-size:34px;letter-spacing:-.7px;margin:0 0 12px;background:linear-gradient(90deg,#fff,#ffb3c0,#fff);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 6s linear infinite}
.hero .lead{color:var(--t2);font-size:15.5px}
.heroart{position:absolute;right:26px;top:50%;transform:translateY(-50%);width:230px;opacity:.95;pointer-events:none}
.heroart .mascot{position:absolute;right:6px;bottom:-8px;width:96px;animation:bob 6s ease-in-out infinite}
.heroart .ring{transform-origin:center;animation:spin 30s linear infinite}
.heroart .ring2{transform-origin:center;animation:spin 44s linear infinite reverse}
.meta{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap;position:relative}
.chip{font-size:12px;color:var(--blue);border:1px solid var(--line2);border-radius:999px;padding:6px 12px;background:rgba(125,176,255,.06)}
/* stat tiles */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:22px}
.stat{position:relative;background:linear-gradient(180deg,var(--card),rgba(8,10,15,.6));border:1px solid var(--line);border-radius:16px;padding:18px;overflow:hidden}
.stat::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(140deg,rgba(226,59,84,.5),transparent 50%);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.6}
.stat .n{font-size:26px;font-weight:800;letter-spacing:-.5px}
.stat .l{color:var(--t3);font-size:12.5px;margin-top:3px}
.stat svg{position:absolute;right:12px;top:12px;width:22px;height:22px;opacity:.35}
/* feature cards */
.fcards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:22px}
.fcard{position:relative;background:linear-gradient(180deg,rgba(20,24,37,.7),rgba(11,14,20,.5));border:1px solid var(--line);border-radius:18px;padding:20px;cursor:pointer;transition:.2s;overflow:hidden}
.fcard:hover{transform:translateY(-4px);border-color:var(--red);box-shadow:0 18px 50px rgba(0,0,0,.45)}
.fcard .ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:rgba(226,59,84,.12);margin-bottom:12px}
.fcard .ic svg{width:24px;height:24px}
.fcard h3{margin:0 0 5px;font-size:16px}.fcard p{margin:0;color:var(--t2);font-size:13px}
.fcard .go{margin-top:10px;color:var(--red2);font-size:12.5px;font-weight:600}
/* charts */
.charts{display:grid;grid-template-columns:1fr;gap:18px;margin:18px 0}
.charts figure{margin:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;cursor:zoom-in;transition:.2s}
.charts figure:hover{transform:translateY(-3px);box-shadow:0 16px 44px rgba(0,0,0,.45);border-color:var(--red)}
.charts img{width:100%;display:block}
.dl{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.btn{position:relative;display:inline-block;background:var(--card);border:1px solid var(--line2);color:var(--t1);border-radius:10px;padding:9px 15px;font-size:13px;overflow:hidden;transition:.18s}
.btn:hover{border-color:var(--red);transform:translateY(-1px)}
.btn::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);transform:skewX(-20deg)}
.btn:hover::after{animation:sweep .7s}
@keyframes sweep{from{left:-60%}to{left:130%}}
.section{margin-top:34px}.section h2.sech{font-size:13px;color:var(--t3);text-transform:uppercase;letter-spacing:.14em;margin:0 0 6px}
.md h1{display:none}.md h2{font-size:21px;margin:30px 0 10px;padding-top:12px;border-top:1px solid var(--line)}
.md h3{font-size:16px;margin:22px 0 8px;color:#f0f3f8}.md p,.md li{color:#d7dce7;font-size:15px}
.md table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px;display:block;overflow-x:auto}
.md th,.md td{border:1px solid var(--line);padding:8px 11px;text-align:left}.md th{background:#0e1219;color:var(--t1)}
.md tbody tr:hover{background:rgba(125,176,255,.05)}
.md code{background:#171c27;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;color:#e7b7c0}
.md pre{background:#0d1017;border:1px solid var(--line);border-radius:12px;padding:15px;overflow:auto}.md pre code{background:none;border:0;color:#c8d0dd}
.md blockquote{border-left:3px solid var(--red);margin:14px 0;padding:6px 16px;color:var(--t2);background:rgba(226,59,84,.05);border-radius:0 10px 10px 0}
.reveal{opacity:0;transform:translateY(22px)}.reveal.in{opacity:1;transform:none;transition:opacity .6s,transform .6s}
.modal{position:fixed;inset:0;z-index:80;background:rgba(6,8,12,.88);backdrop-filter:blur(9px);display:none;align-items:center;justify-content:center;padding:30px}
.modal.open{display:flex;animation:fadeup .25s both}
.modal img{max-width:96vw;max-height:90vh;border:1px solid var(--line2);border-radius:14px;box-shadow:0 30px 90px rgba(0,0,0,.65);background:#fff}
.modal .x{position:absolute;top:18px;right:24px;font-size:26px;color:#fff;cursor:pointer;border:1px solid var(--line2);border-radius:10px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(20,25,36,.7)}
.menubtn{display:none}
@media(max-width:860px){
  .sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:.25s;box-shadow:0 0 60px rgba(0,0,0,.6)}
  .sidebar.open{transform:translateX(0)}
  .menubtn{display:flex;position:fixed;top:14px;left:14px;z-index:55;width:44px;height:44px;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--line2);border-radius:11px;color:var(--t1);font-size:18px}
  .content{padding:64px 18px 80px}.heroart{display:none}.hero h1{font-size:27px}
}
@media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}.reveal{opacity:1;transform:none}}
</style></head><body>
<canvas id="particles"></canvas>
<div class="bgwrap"><span class="blob a"></span><span class="blob b"></span><span class="blob c"></span></div>
<div class="grid"></div>
<div class="scrollprog" id="prog"></div>
<button class="menubtn" id="menubtn" aria-label="Menu">&#9776;</button>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><img src="mascot.png" alt=""><div><div class="bt">RBNT Report</div><div class="bs">Redbelly · by Smartcoded</div></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="sidefoot">
      <a href="https://redbelly.network" target="_blank" rel="noopener">redbelly.network</a>
      <a href="https://redbelly.routescan.io" target="_blank" rel="noopener">Explorer</a>
      <a href="https://x.com/smartcoded" target="_blank" rel="noopener">@smartcoded</a>
    </div>
  </aside>
  <main><div class="content" id="content"></div></main>
</div>
<div class="modal" id="modal"><div class="x" id="modalx">&times;</div><img id="modalimg" src="" alt=""></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.6/purify.min.js" integrity="sha384-JEyTNhjM6R1ElGoJns4U2Ln4ofPcqzSsynQkmEc/KGy6336qAZl70tDLufbkla+3" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha384-F/bZzf7p3Joyp5psL90p/p89AZJsndkSoGwRpXcZhleCWhd8SnRuoYo4d0yirjJp" crossorigin="anonymous"></script>
<script src="./app.js?v=3"></script>
</body></html>
